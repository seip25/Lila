{% extends layout | default('lila/base.html') %}
{% block title %}{{title}}{% endblock %}

{% block content %}
<header>
        <nav class="container">
            <h3>
                <a href="/dashboard" class="text-indigo-500 font-bold">Lila</a>
            </h3>
        </nav>

    </header>
    <main>
        <aside>
            <h3>Menu</h3>
            <a href="/dashboard" class="active">{{translate['home']}}</a>
            <a href="/profile">{{user.name}}</a>
            <a href="?lang=es">Español (Esp)</a>
            <a href="?lang=en">English (US)</a>
            <a href="/logout">{{translate['logout']}}</a>
        </aside>
        <article>
            <h3 class="text-xl">{{translate['Welcome']}}, {{user.name}}!</h3>
        </article>
    </main>
{% endblock %}
