{% extends layout | default('lila/base.html') %}
{% block title %}{{title}}{% endblock %}

{% block content %}
<main class="min-h-screen bg-bg-body dark:bg-bg-body-dark flex flex-col justify-center items-center px-4 py-12 transition-colors duration-300 font-sans">
    <div class="card w-full max-w-md p-8 transform hover:scale-101">
        <h3 class="text-lila text-3xl text-center mb-8">
            {{translate['create account']}}
        </h3>

        <form id="register-form" class="space-y-5">
            <div>
                <label for="name" class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">{{translate['name']}}</label>
                <input type="text" id="name" name="name" class="input-lila" required>
            </div>
            <div>
                <label for="email" class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Email</label>
                <input type="email" id="email" name="email" class="input-lila" required>
            </div>
            <div>
                <label for="password" class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">{{translate['password']}}</label>
                <input type="password" id="password" name="password" class="input-lila" required>
            </div>
            <div>
                <label for="password_2" class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">{{translate['confirm_password']}}</label>
                <input type="password" id="password_2" name="password_2" class="input-lila" required>
            </div>

            <button type="submit" class="btn-primary w-full justify-center mt-4">
                {{translate['register']}}
            </button>

            <div class="text-center pt-2">
                <p class="text-sm text-slate-500">
                    {{translate['Already have an account?']}} 
                    <a href="/login" class="link-lila ml-1">{{translate['login']}}</a>
                </p>
            </div>
            
            <p id="error-message" class="text-red-500 mt-2 text-center text-sm font-semibold"></p>
        </form>
    </div>

    <!-- Language Selector -->
    <div class="mt-8 w-full max-w-md flex justify-center gap-2">
        <a href="?lang=es" class="px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-800 bg-surface dark:bg-surface-dark hover:bg-slate-100 dark:hover:bg-slate-800 text-xs font-bold transition-all shadow-sm flex items-center gap-1">
            <span>🇪🇸</span> Español
        </a>
        <a href="?lang=en" class="px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-800 bg-surface dark:bg-surface-dark hover:bg-slate-100 dark:hover:bg-slate-800 text-xs font-bold transition-all shadow-sm flex items-center gap-1">
            <span>🇺🇸</span> English
        </a>
    </div>
</main>

<script>
    document.getElementById('register-form').addEventListener('submit', async function (event) {
        event.preventDefault();
        const form = event.target;
        const formData = new FormData(form);
        const errorMessage = document.getElementById('error-message');
        try {
            const response = await fetch('/register', {
                method: 'POST',
                body: JSON.stringify(Object.fromEntries(formData)),
                headers: { 'Content-Type': 'application/json' }
            });
            const result = await response.json();
            if (response.ok && result.success) {
                window.location.replace('/dashboard');
            } else {
                errorMessage.textContent = result.msg || 'Failed to register.';
            }
        } catch (error) {
            errorMessage.textContent = 'Failed to connect to the server.';
        }
    });
</script>
{% endblock %}
