{% extends layout | default('lila/base.html') %}
{% block title %}{{title}}{% endblock %}

{% block content %}
<main class="min-h-screen bg-bg-body dark:bg-bg-body-dark flex flex-col justify-center items-center px-4 py-12 transition-colors duration-300 font-sans">
    <div class="w-full max-w-md bg-surface dark:bg-surface-dark border border-slate-200 dark:border-slate-800 rounded-2xl shadow-material-lg p-8 transform hover:scale-101 transition-all duration-300">
        <h3 class="text-3xl font-black tracking-tight text-center bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent mb-8">
            {{translate['login']}}
        </h3>

        <form id="login-form" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Email</label>
                <input type="email" id="email" name="email" class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-800 dark:text-slate-100" required>
            </div>
            <div>
                <label for="password" class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">{{translate['password']}}</label>
                <input type="password" id="password" name="password" class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-800 dark:text-slate-100" required>
            </div>
            
            <div class="flex items-center justify-end">
                <a href="/forgot-password" class="text-xs font-semibold text-secondary hover:text-secondary-dark hover:underline transition-colors">
                    {{translate['forgot your password']}}
                </a>
            </div>

            <button type="submit" class="w-full py-3 bg-primary hover:bg-primary-dark text-white font-bold rounded-xl shadow-material hover:shadow-material-lg transform hover:-translate-y-0.5 transition-all duration-200 uppercase tracking-wide text-sm cursor-pointer">
                {{translate['login']}}
            </button>

            <div class="text-center pt-2">
                <p class="text-sm text-slate-500">
                    <a href="/register" class="font-bold text-primary hover:underline transition-colors">{{translate['create account']}}</a>
                </p>
            </div>
            
            <p id="error-message" class="text-red-500 mt-2 text-center text-sm font-semibold"></p>
        </form>
    </div>

    <!-- Language Selector -->
    <div class="mt-8 w-full max-w-md flex justify-center gap-2">
        <a href="?lang=es" class="px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-800 bg-surface dark:bg-surface-dark hover:bg-slate-100 dark:hover:bg-slate-800 text-xs font-bold transition-all shadow-sm flex items-center gap-1">
            <span>🇪🇸</span> Español
        </a>
        <a href="?lang=en" class="px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-800 bg-surface dark:bg-surface-dark hover:bg-slate-100 dark:hover:bg-slate-800 text-xs font-bold transition-all shadow-sm flex items-center gap-1">
            <span>🇺🇸</span> English
        </a>
    </div>
</main>

<script>
    document.getElementById('login-form').addEventListener('submit', async function (event) {
        event.preventDefault();
        const form = event.target;
        const formData = new FormData(form);
        const errorMessage = document.getElementById('error-message');
        try {
            const response = await fetch('/login', {
                method: 'POST',
                body: JSON.stringify(Object.fromEntries(formData)),
                headers: { 'Content-Type': 'application/json' }
            });
            const result = await response.json();
            if (response.ok && result.success) {
                window.location.replace('/dashboard');
            } else {
                errorMessage.textContent = result.msg || 'An unknown error occurred.';
            }
        } catch (error) {
            errorMessage.textContent = 'Failed to connect to the server.';
        }
    });
</script>
{% endblock %}
