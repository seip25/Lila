    <article id="minify-eng">
      <h1>⚡ Minify Files for Production</h1>
      <p>
        With the <code
          class="font-mono font-medium text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-950 px-2 py-0.5 rounded-md">lila-minify</code>
        command you can minify your js, css files,
        which are in the <code
          class="font-mono font-medium text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-950 px-2 py-0.5 rounded-md">public</code>
        and <code
          class="font-mono font-medium text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-950 px-2 py-0.5 rounded-md">templates</code>
        folders.
      </p>


      <div class="bg-gray-900 rounded-lg shadow-2xl font-mono text-sm overflow-hidden mb-4 mt-8 mt-4 mb-4">
        <div class="flex items-center justify-between p-3 bg-gray-800 border-b border-gray-700">
          <span class="editor-title text-gray-300 dark:text-gray-400">Terminal Command</span>
          <div class="flex space-x-2">
            <div class="w-3 h-3 bg-red-500 rounded-full"></div>
            <div class="w-3 h-3 bg-yellow-500 rounded-full"></div>
            <div class="w-3 h-3 bg-green-500 rounded-full"></div>
          </div>
        </div>
        <div class="editor-content">
          <pre><code class="language-bash">
lila-minify
</code></pre>
        </div>
      </div>


    </article>
