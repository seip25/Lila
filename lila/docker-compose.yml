services:
  mysql:
    image: mysql:8.0
    container_name: lila-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lila_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

