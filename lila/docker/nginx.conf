limit_req_zone $binary_remote_addr zone=lila_limit:10m rate=60r/s;

upstream lila_app {
    server unix:/tmp/sockets/lila.sock fail_timeout=0;
    server app:8000 backup;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html/public;
 
    client_max_body_size 50M;
    keepalive_timeout 65;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;
    
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
 
    location /public/ {
        alias /usr/share/nginx/html/public/;
        try_files $uri $uri/ @lila;
        add_header Cache-Control "public, max-age=3600, no-transform";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|map)$ {
        try_files $uri @lila;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }
 
    location / {
        try_files $uri @json_404 @lila;
    }

    location @lila {
        limit_req zone=lila_limit burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://lila_app;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
 
    error_page 429 = @json_429;
    location @json_429 {
        default_type application/json;
        return 429 '{"error":"Too Many Requests","code":429,"message":"Rate limit exceeded."}';
    }

    # error_page 404 = @json_404;
    # location @json_404 {
    #     default_type application/json;
    #     return 404 '{"error":"Not Found","code":404,"message":"Resource not found."}';
    # }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }
}
