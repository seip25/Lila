<!DOCTYPE html>
<html lang="{{ lang }}">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/img/lila.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - {{ model_name.capitalize() }}</title>
    {{ asset('css/tailwind.css', force_static=True) | safe }}
</head>

<body class="bg-bg-body dark:bg-bg-body-dark text-slate-800 dark:text-slate-200 transition-colors duration-300 font-sans min-h-screen">
    <div class="max-w-7xl mx-auto px-4 py-8 flex flex-col md:flex-row gap-8">
        <!-- Dynamic Sidebar menu -->
        <div class="w-25">
        {{ menu | safe }}
        </div>

        <!-- Main CRUD Table Workspace -->
        <main class="flex-1 space-y-6">
            <header class="flex items-center justify-between bg-surface dark:bg-surface-dark border border-slate-200 dark:border-slate-800 p-6 rounded-2xl shadow-sm">
                <h2 class="text-2xl font-black bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">{{ model_name.capitalize() }}s</h2>
                <div class="text-xs text-slate-400 font-bold uppercase tracking-wider">CRUD Management</div>
            </header>

            <article class="bg-surface dark:bg-surface-dark border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-material">
                <div id="table" class="overflow-x-auto"></div>
            </article>
        </main>
    </div>

    {{ asset('js/utils.js', force_static=True) | safe }}
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dataTable = new ResponsiveDataTable('table', {
                data: {{ items_json | safe }},
                columns: [
                    {% for header in headers %}
                        {
                            title: "{{ header.capitalize() }}",
                            key: "{{ header }}"
                        }
                        {% if not loop.last %}
                            ,
                        {% endif %}
                    {% endfor %}
                ],
                rowsPerPage: 10,
                search: true,
                pagination: true,
                responsive: true,
                headerTitles: {
                    "id": "ID"
                },
                summaryFields: ['id']
            });
        });
    </script>
</body>

</html>
